<!doctype html>
<html>
  <head>
    <title>Render List 1</title>
  </head>

  <body>
    <h1>List</h1>

    <h2 id="recordList"></h2>

    <div id="myList"></div>
    <button id="loadMoreBtn" onclick="loadMore()">Load More</button>

    <script>
      let userList = [];
      let visibleCount = 10;

      const listContainer = document.getElementById("myList");
      const recordList = document.getElementById("recordList");
      const loadMoreBtn = document.getElementById("loadMoreBtn");

      const getList = async () => {
        const response = await fetch(
          "https://dummy-json.mock.beeceptor.com/comments",
        );
        return await response.json();
      };

      const renderList = () => {
        listContainer.innerHTML = "";

        const dataToShow = userList.slice(0, visibleCount);

        recordList.innerHTML = `${dataToShow.length} record is showing out of ${userList.length} record`;

        dataToShow.forEach((element) => {
          const row = document.createElement("div");

          row.innerHTML = `
            <span style="margin:5px">${element.id}</span>
            <span style="margin:5px">${element.postId}</span>
            <span style="margin:5px">${element.name}</span>
            <span style="margin:5px">${element.email}</span>
            <span style="margin:5px">${element.body}</span>
             `;

          listContainer.appendChild(row);
        }); // 🔥 Hide button when all records are loaded

        if (visibleCount >= userList.length) {
          loadMoreBtn.style.display = "none";
        } else {
          loadMoreBtn.style.display = "block";
        }
      };

      const loadMore = () => {
        visibleCount += 2;

        if (visibleCount > userList.length) {
          visibleCount = userList.length;
        }

        renderList();
      }; // Initial API call

      getList().then((data) => {
        userList = data;
        renderList();
      });
    </script>
  </body>
</html>
